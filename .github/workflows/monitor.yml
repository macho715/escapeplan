name: Iran-UAE Monitor (30m)

on:
  schedule:
    # Every 30 minutes (UTC), offset from :00 to reduce queue contention.
    - cron: '7,37 * * * *'
  workflow_dispatch: {}

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Preflight NotebookLM required secret
        env:
          NLM_COOKIES_JSON: ${{ secrets.NLM_COOKIES_JSON }}
        run: |
          if [ -z "$NLM_COOKIES_JSON" ]; then
            echo "::error::NLM_COOKIES_JSON is required for this workflow."
            exit 1
          fi

      - name: Restore NotebookLM auth profile
        env:
          NLM_COOKIES_JSON: ${{ secrets.NLM_COOKIES_JSON }}
          NLM_METADATA_JSON: ${{ secrets.NLM_METADATA_JSON }}
          NOTEBOOKLM_MCP_CLI_PATH: ${{ github.workspace }}/.notebooklm-mcp-cli
        run: |
          if [ -z "$NLM_COOKIES_JSON" ]; then
            echo "::error::NLM_COOKIES_JSON not set, cannot restore NotebookLM profile"
            exit 1
          fi
          mkdir -p "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default"
          chmod 700 "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default"
          echo "$NLM_COOKIES_JSON" > "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/cookies.json"
          chmod 600 "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/cookies.json"
          if [ -n "$NLM_METADATA_JSON" ]; then
            echo "$NLM_METADATA_JSON" > "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/metadata.json"
            chmod 600 "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/metadata.json"
          fi
          echo "NotebookLM profile restored."

      - name: Validate NotebookLM auth profile
        env:
          NOTEBOOKLM_MCP_CLI_PATH: ${{ github.workspace }}/.notebooklm-mcp-cli
        run: |
          python - <<'PY'
          from notebooklm_tools.core.auth import AuthManager
          from notebooklm_tools.core.client import NotebookLMClient

          profile = AuthManager().load_profile()
          with NotebookLMClient(
              cookies=profile.cookies,
              csrf_token=profile.csrf_token,
              session_id=profile.session_id,
          ) as client:
              notebooks = client.list_notebooks()
          print(f"NotebookLM auth validated. notebooks={len(notebooks)}")
          PY

      - name: Run monitor once (canonical)
        env:
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Twilio WhatsApp (optional)
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_RECIPIENTS: ${{ secrets.WHATSAPP_RECIPIENTS }}

          # Storage backend (Phase 4)
          # - If DATABASE_URL is set, backend auto switches to 'postgres'.
          # - If empty, it stays sqlite (local file).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
          STORAGE_ENABLED: "true"

          # Runtime
          HEADLESS: "true"
          LOG_LEVEL: "INFO"
          NOTEBOOKLM_MCP_CLI_PATH: ${{ github.workspace }}/.notebooklm-mcp-cli

          # Phase 2 (NotebookLM): enabled; falls back to rule-based analysis on upload failure.
          PHASE2_ENABLED: "true"
          # Optional: set APPROVE_SEND=APPROVE_SEND when using non-interactive forced sending
          APPROVE_SEND: ${{ secrets.APPROVE_SEND || '' }}
        run: |
          python scripts/run_now.py --telegram-send

      - name: Publish hyie_state.json to urgentdash-live branch
        if: success()
        run: |
          if [ ! -f state/hyie_state.json ]; then
            echo "state/hyie_state.json not found, skipping publish"
            exit 0
          fi
          cp state/hyie_state.json /tmp/hyie_state.json
          git checkout -- state/hyie_state.json || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin urgentdash-live > /dev/null; then
            git fetch origin urgentdash-live
            git checkout urgentdash-live
          else
            git checkout --orphan urgentdash-live
            git rm -rf . > /dev/null 2>&1 || true
          fi
          if [ ! -d react ]; then
            git checkout origin/main -- react
          fi
          mkdir -p live
          cp /tmp/hyie_state.json live/hyie_state.json
          git add live/hyie_state.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update hyie_state.json [skip ci]"
            if git ls-remote --exit-code --heads origin urgentdash-live > /dev/null; then
              git push origin urgentdash-live
            else
              git push -u origin urgentdash-live
            fi
          fi
          echo "Published hyie_state.json to urgentdash-live branch"

      - name: Upload artifacts (reports/state/ledger) for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-artifacts-${{ github.run_id }}
          path: |
            reports
            state
            ledger
            .health_state.json
          if-no-files-found: ignore
          retention-days: 7
