name: Iran-UAE Monitor (15m Overschedule)

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

concurrency:
  group: iran-uae-monitor
  cancel-in-progress: false

env:
  NOTEBOOKLM_MCP_CLI_PATH: ${{ github.workspace }}/.notebooklm-mcp-cli
  LIVE_LATEST_URL: https://raw.githubusercontent.com/${{ github.repository }}/urgentdash-live/live/latest.json
  HAS_NLM_COOKIES: ${{ secrets.NLM_COOKIES_JSON != '' }}

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Freshness gate
        id: freshness
        env:
          LIVE_LATEST_URL: ${{ env.LIVE_LATEST_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from urllib.request import urlopen

          latest_url = os.environ["LIVE_LATEST_URL"]
          output_path = os.environ["GITHUB_OUTPUT"]
          skip = False
          reason = "stale_or_missing"
          try:
              with urlopen(latest_url, timeout=15) as response:
                  payload = json.load(response)
              published_at = str(payload.get("publishedAt") or "").strip()
              if published_at:
                  published_dt = datetime.fromisoformat(published_at.replace("Z", "+00:00")).astimezone(timezone.utc)
                  age_seconds = (datetime.now(timezone.utc) - published_dt).total_seconds()
                  if age_seconds < 25 * 60:
                      skip = True
                      reason = f"published_{int(age_seconds)}s_ago"
          except Exception as exc:
              reason = f"freshness_probe_failed:{type(exc).__name__}"

          with open(output_path, "a", encoding="utf-8") as f:
              f.write(f"skip={'true' if skip else 'false'}\n")
              f.write(f"reason={reason}\n")
          print(f"Freshness gate skip={skip} reason={reason}")
          PY

      - name: Run monitor lite
        if: steps.freshness.outputs.skip != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_RECIPIENTS: ${{ secrets.WHATSAPP_RECIPIENTS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
          STORAGE_ENABLED: "true"
          HEADLESS: "true"
          LOG_LEVEL: "INFO"
          PHASE2_ENABLED: "true"
          APPROVE_SEND: ${{ secrets.APPROVE_SEND || '' }}
        run: |
          python scripts/run_now.py --mode lite --telegram-send

      - name: Export live lite payloads
        id: export_lite
        if: steps.freshness.outputs.skip != 'true'
        run: |
          python scripts/export_hyie_live.py --publish-mode lite

      - name: Publish lite payloads to urgentdash-live
        if: steps.export_lite.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/publish_live_branch.py \
            --source-live-dir live \
            --repo "$GITHUB_REPOSITORY" \
            --token "$GH_TOKEN" \
            --commit-message "chore: update live lite payloads [skip ci]"

      - name: Smoke test published live payloads
        if: steps.export_lite.outcome == 'success'
        env:
          LIVE_LATEST_URL: ${{ env.LIVE_LATEST_URL }}
        run: |
          python scripts/smoke_test_live.py --latest-url "$LIVE_LATEST_URL"

      - name: Restore NotebookLM auth profile
        id: restore_notebooklm
        if: steps.freshness.outputs.skip != 'true' && env.HAS_NLM_COOKIES == 'true'
        continue-on-error: true
        env:
          NLM_COOKIES_JSON: ${{ secrets.NLM_COOKIES_JSON }}
          NLM_METADATA_JSON: ${{ secrets.NLM_METADATA_JSON }}
          NOTEBOOKLM_MCP_CLI_PATH: ${{ env.NOTEBOOKLM_MCP_CLI_PATH }}
        run: |
          mkdir -p "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default"
          chmod 700 "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default"
          echo "$NLM_COOKIES_JSON" > "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/cookies.json"
          chmod 600 "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/cookies.json"
          if [ -n "$NLM_METADATA_JSON" ]; then
            echo "$NLM_METADATA_JSON" > "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/metadata.json"
            chmod 600 "$NOTEBOOKLM_MCP_CLI_PATH/profiles/default/metadata.json"
          fi
          echo "NotebookLM profile restored."

      - name: Validate NotebookLM auth profile
        if: steps.restore_notebooklm.outcome == 'success'
        continue-on-error: true
        env:
          NOTEBOOKLM_MCP_CLI_PATH: ${{ env.NOTEBOOKLM_MCP_CLI_PATH }}
        run: |
          python - <<'PY'
          from notebooklm_tools.core.auth import AuthManager
          from notebooklm_tools.core.client import NotebookLMClient

          profile = AuthManager().load_profile()
          with NotebookLMClient(
              cookies=profile.cookies,
              csrf_token=profile.csrf_token,
              session_id=profile.session_id,
          ) as client:
              notebooks = client.list_notebooks()
          print(f"NotebookLM auth validated. notebooks={len(notebooks)}")
          PY

      - name: Run monitor ai
        id: run_ai
        if: steps.freshness.outputs.skip != 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_RECIPIENTS: ${{ secrets.WHATSAPP_RECIPIENTS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
          STORAGE_ENABLED: "true"
          HEADLESS: "true"
          LOG_LEVEL: "INFO"
          PHASE2_ENABLED: "true"
          APPROVE_SEND: ${{ secrets.APPROVE_SEND || '' }}
          NOTEBOOKLM_MCP_CLI_PATH: ${{ env.NOTEBOOKLM_MCP_CLI_PATH }}
        run: |
          python scripts/run_now.py --mode ai --telegram-send

      - name: Export live ai payloads
        id: export_ai
        if: steps.run_ai.outcome == 'success'
        run: |
          python scripts/export_hyie_live.py --publish-mode ai

      - name: Publish ai payloads to urgentdash-live
        if: steps.export_ai.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/publish_live_branch.py \
            --source-live-dir live \
            --repo "$GITHUB_REPOSITORY" \
            --token "$GH_TOKEN" \
            --commit-message "chore: update live ai payloads [skip ci]"

      - name: Upload artifacts (reports/state/ledger/live) for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-artifacts-${{ github.run_id }}
          path: |
            reports
            state
            ledger
            live
            .health_state.json
          if-no-files-found: ignore
          retention-days: 7
